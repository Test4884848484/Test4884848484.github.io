<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Профиль пользователя -->
        <div id="userProfile" class="user-profile">
            <!-- Загружается через JavaScript -->
        </div>

        <!-- Игровая секция -->
        <div class="game-section">
            <h2>🎮 Мини-игры</h2>
            
            <!-- Кликер игра -->
            <div class="game-card">
                <h3>🪙 Кликер</h3>
                <p>Нажимай на монету чтобы зарабатывать!</p>
                <div class="clicker-game">
                    <div class="coin" id="clickerCoin">🪙</div>
                    <div class="game-stats">
                        <span>Кликов: <span id="clickCount">0</span></span>
                        <span>Монет: <span id="coinCount">0</span></span>
                    </div>
                    <button onclick="saveCoins()" class="save-btn">💾 Сохранить</button>
                </div>
            </div>

            <!-- Другие игры можно добавить здесь -->
        </div>

        <!-- Статус -->
        <div class="status" id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
