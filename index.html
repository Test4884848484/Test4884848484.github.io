<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot AI — Умный чат</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════════════════ */
:root {
  --bg:       #0a0a0f;
  --surface:  #111118;
  --surface2: #18181f;
  --border:   #ffffff12;
  --border2:  #ffffff20;
  --text:     #e8e8f0;
  --muted:    #6b6b80;
  --accent:   #7c5cfc;
  --accent2:  #a78bfa;
  --accent3:  #c4b5fd;
  --green:    #34d399;
  --red:      #f87171;
  --r:        12px;
  --r-sm:     8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  position: relative;
}

/* Grain texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* Background glow */
body::after {
  content: '';
  position: fixed;
  top: -30%; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 500px;
  background: radial-gradient(ellipse, #7c5cfc18 0%, transparent 70%);
  pointer-events: none;
}

/* ══════════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════════ */
#app {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
#sidebar {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(to right, var(--text), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Sub info */
#sub-info {
  font-size: 12px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
}

#sub-info.active { border-color: #34d39930; }
#sub-info .sub-name { font-weight: 600; color: var(--green); font-size: 13px; }
#sub-info .sub-exp { color: var(--muted); margin-top: 2px; }

/* New chat button */
.btn-new-chat {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 16px;
  margin: 16px 20px 0;
  width: calc(100% - 40px);
  background: linear-gradient(135deg, var(--accent), #6d28d9);
  border: none; border-radius: var(--r-sm);
  color: #fff; font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.btn-new-chat:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-new-chat:active { transform: translateY(0); }
.btn-new-chat svg { flex-shrink: 0; }

/* Chat list */
#chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px;
}

#chat-list::-webkit-scrollbar { width: 4px; }
#chat-list::-webkit-scrollbar-track { background: transparent; }
#chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.chat-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
  margin-bottom: 2px;
}
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: #7c5cfc18; border: 1px solid #7c5cfc30; }

.chat-item-info { flex: 1; min-width: 0; }
.chat-item-title {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-item-model { font-size: 11px; color: var(--muted); margin-top: 2px; }

.chat-item-del {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 2px;
  opacity: 0; transition: opacity 0.15s, color 0.15s;
  flex-shrink: 0;
}
.chat-item:hover .chat-item-del { opacity: 1; }
.chat-item-del:hover { color: var(--red); }

.chats-empty {
  text-align: center; padding: 32px 16px;
  color: var(--muted); font-size: 13px;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
}

.btn-logout {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 12px;
  background: none; border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--muted);
  font-family: 'Syne', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.btn-logout:hover { border-color: var(--border2); color: var(--text); }

/* ══════════════════════════════════════════════════════
   MAIN AREA
══════════════════════════════════════════════════════ */
#main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── Auth screen ─────────────────────────────────────── */
#auth-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 24px;
}

#auth-screen.visible { display: flex; }

.auth-card {
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 40px 36px;
  position: relative;
  overflow: hidden;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, #7c5cfc20 0%, transparent 70%);
  pointer-events: none;
}

.auth-title {
  font-size: 28px; font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.auth-subtitle {
  color: var(--muted); font-size: 14px;
  margin-bottom: 32px;
}

.input-group { margin-bottom: 16px; }

.input-label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--muted); margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.input-field {
  width: 100%; padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; letter-spacing: 2px;
  transition: border-color 0.15s;
  outline: none;
}
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--muted); letter-spacing: 1px; }

.btn-primary {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--accent), #6d28d9);
  border: none; border-radius: var(--r-sm);
  color: #fff; font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
  margin-top: 8px;
}
.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.auth-error {
  margin-top: 14px; padding: 10px 14px;
  background: #f8717115; border: 1px solid #f8717130;
  border-radius: var(--r-sm);
  color: var(--red); font-size: 13px;
  display: none;
}
.auth-error.visible { display: block; }

/* ── Welcome screen ────────────────────────────────────── */
#welcome-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}
#welcome-screen.visible { display: flex; }

.welcome-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin-bottom: 24px;
  box-shadow: 0 0 60px #7c5cfc30;
}

.welcome-title {
  font-size: 32px; font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.welcome-sub { color: var(--muted); font-size: 15px; max-width: 380px; line-height: 1.6; }

.models-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
  margin-top: 32px; max-width: 500px;
}

.model-chip {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px; color: var(--muted);
}

/* ── Chat screen ───────────────────────────────────────── */
#chat-screen {
  display: none;
  flex-direction: column;
  height: 100%;
}
#chat-screen.visible { display: flex; }

/* Chat header */
.chat-header {
  display: flex; align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
  background: var(--surface);
}

.chat-header-info { flex: 1; min-width: 0; }
.chat-header-title {
  font-size: 16px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-header-model { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.message {
  display: flex;
  gap: 12px;
  max-width: 820px;
  animation: msgIn 0.25s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; align-self: flex-end; }
.message.assistant { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.message.user .msg-avatar {
  background: linear-gradient(135deg, var(--accent), #6d28d9);
}
.message.assistant .msg-avatar {
  background: var(--surface2);
  border: 1px solid var(--border);
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--r);
  font-size: 14px; line-height: 1.65;
  max-width: 680px;
}

.message.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #6d28d9);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.message.assistant .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

/* Markdown in assistant messages */
.msg-bubble pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 10px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

.msg-bubble code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
}

.msg-bubble pre code { background: none; padding: 0; }
.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 8px 0; }
.msg-bubble li { margin-bottom: 4px; }
.msg-bubble strong { font-weight: 700; }
.msg-bubble em { font-style: italic; }
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 6px; font-weight: 700; }
.msg-bubble blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px; color: var(--muted);
  margin: 8px 0;
}

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing-dot {
  width: 7px; height: 7px;
  background: var(--muted);
  border-radius: 50%;
  animation: typingPulse 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingPulse {
  0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Input area */
.input-area {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.input-row {
  display: flex; gap: 10px; align-items: flex-end;
}

#msg-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 180px;
  transition: border-color 0.15s;
  line-height: 1.5;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--muted); }

.btn-send {
  width: 48px; height: 48px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #6d28d9);
  border: none; border-radius: var(--r-sm);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s, transform 0.15s;
  color: #fff;
}
.btn-send:hover { opacity: 0.85; transform: scale(1.04); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── Modal: New Chat ─────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: #00000090;
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.visible { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 32px;
  width: 100%; max-width: 440px;
  position: relative;
  animation: modalIn 0.2s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(-10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-title {
  font-size: 20px; font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 24px;
}

.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 4px;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--text); }

.model-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 280px; overflow-y: auto;
  margin-bottom: 20px;
}
.model-list::-webkit-scrollbar { width: 4px; }
.model-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.model-option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.model-option:hover { border-color: var(--border2); }
.model-option.selected { border-color: var(--accent); background: #7c5cfc15; }
.model-option-icon { font-size: 18px; flex-shrink: 0; }
.model-option-name { font-size: 14px; font-weight: 600; }

.loading-overlay {
  position: fixed; inset: 0;
  background: #0a0a0f95;
  z-index: 200;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.loading-overlay.visible { display: flex; }

.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--muted); font-size: 14px; }

/* ── Toast ────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 12px 20px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s;
  pointer-events: none;
}
#toast.visible { opacity: 1; transform: translateY(0); }
#toast.error { border-color: #f8717140; color: var(--red); }
#toast.success { border-color: #34d39940; color: var(--green); }

/* ── Responsive ──────────────────────────────────── */
@media (max-width: 680px) {
  #app { grid-template-columns: 1fr; }
  #sidebar { display: none; }
  #sidebar.mobile-open {
    display: flex;
    position: fixed; inset: 0 80px 0 0;
    z-index: 50;
  }
}
</style>
</head>
<body>

<div id="app">
  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">Copilot AI</span>
      </div>
      <div id="sub-info">
        <div class="sub-name" id="sub-name">—</div>
        <div class="sub-exp" id="sub-exp">Нет подписки</div>
      </div>
    </div>

    <button class="btn-new-chat" id="btn-new-chat">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M3 8h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Новый чат
    </button>

    <div id="chat-list">
      <div class="chats-empty" id="chats-empty">Чатов пока нет</div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M5 2H2a1 1 0 00-1 1v8a1 1 0 001 1h3M9 10l3-3-3-3M13 7H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Выйти
      </button>
    </div>
  </aside>

  <!-- ═══════════════════ MAIN ═══════════════════ -->
  <main id="main">

    <!-- Auth screen -->
    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-title">Войти</div>
        <div class="auth-subtitle">Введите код активации для доступа к AI-моделям</div>
        <div class="input-group">
          <label class="input-label" for="code-input">Код активации</label>
          <input
            class="input-field" id="code-input"
            type="text" placeholder="XXXX-XXXX-XXXX"
            maxlength="14" autocomplete="off" spellcheck="false"
          >
        </div>
        <button class="btn-primary" id="btn-activate">Активировать</button>
        <div class="auth-error" id="auth-error"></div>
      </div>
    </div>

    <!-- Welcome screen -->
    <div id="welcome-screen">
      <div class="welcome-icon">✦</div>
      <div class="welcome-title">С чего начнём?</div>
      <div class="welcome-sub">Создайте новый чат и выберите AI-модель. Доступны Claude, GPT, Gemini и другие.</div>
      <div class="models-grid" id="welcome-models"></div>
    </div>

    <!-- Chat screen -->
    <div id="chat-screen">
      <div class="chat-header">
        <div class="chat-header-info">
          <div class="chat-header-title" id="chat-title">—</div>
          <div class="chat-header-model" id="chat-model">—</div>
        </div>
      </div>

      <div id="messages"></div>

      <div class="input-area">
        <div class="input-row">
          <textarea id="msg-input" placeholder="Напишите сообщение…" rows="1"></textarea>
          <button class="btn-send" id="btn-send" disabled>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M2 10l16-8-8 16-2-6-6-2z" fill="white"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- New chat modal -->
<div class="modal-overlay" id="modal-new-chat">
  <div class="modal">
    <button class="modal-close" id="modal-close">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="modal-title">Новый чат</div>
    <div class="input-group">
      <label class="input-label">Название (необязательно)</label>
      <input class="input-field" id="chat-title-input" type="text" placeholder="Мой чат" style="letter-spacing: normal; font-family: 'Syne', sans-serif;">
    </div>
    <div class="input-group" style="margin-bottom: 0;">
      <label class="input-label">Модель</label>
      <div class="model-list" id="model-list"></div>
    </div>
    <button class="btn-primary" id="btn-create-chat" style="margin-top: 20px;">Создать чат</button>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Открываю браузер…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// CONFIG — замени на свой URL бэкенда
// ════════════════════════════════════════════════════════
const API = 'https://46-173-27-68.sslip.io:8443';  // ← твой бэкенд

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let state = {
  token:      localStorage.getItem('token') || null,
  userId:     localStorage.getItem('userId') || null,
  sub:        JSON.parse(localStorage.getItem('sub') || 'null'),
  chats:      [],
  activeChatId: null,
  sending:    false,
};

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
const $  = id => document.getElementById(id);
const el = (tag, cls, inner) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (inner !== undefined) e.innerHTML = inner;
  return e;
};

function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'visible ' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = '', 3000);
}

function showLoading(text = 'Загрузка…') {
  $('loading-text').textContent = text;
  $('loading').classList.add('visible');
}

function hideLoading() { $('loading').classList.remove('visible'); }

async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
  if (body) opts.body = JSON.stringify(body);

  const r = await fetch(API + path, opts);
  const data = await r.json().catch(() => ({}));

  if (!r.ok) throw new Error(data.detail || `Ошибка ${r.status}`);
  return data;
}

// Markdown → HTML (простой рендерер)
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // code blocks
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`
    )
    // inline code
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    // headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // hr
    .replace(/^[-*]{3,}$/gm, '<hr>')
    // ul
    .replace(/^[•\-*] (.+)$/gm, '<li>$1</li>')
    // ol
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // newlines
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  // wrap li sequences
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  return `<p>${html}</p>`;
}

// ════════════════════════════════════════════════════════
// SCREENS
// ════════════════════════════════════════════════════════
function showScreen(name) {
  ['auth-screen', 'welcome-screen', 'chat-screen'].forEach(s =>
    $(s).classList.toggle('visible', s === name + '-screen')
  );
}

// ════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════
function saveAuth(data) {
  state.token  = data.token;
  state.userId = data.user_id;
  state.sub    = data.subscription;
  localStorage.setItem('token',  state.token);
  localStorage.setItem('userId', state.userId);
  localStorage.setItem('sub',    JSON.stringify(state.sub));
}

function clearAuth() {
  state.token = state.userId = state.sub = null;
  localStorage.removeItem('token');
  localStorage.removeItem('userId');
  localStorage.removeItem('sub');
}

function updateSubInfo() {
  if (!state.sub) return;
  $('sub-name').textContent = state.sub.name;
  $('sub-exp').textContent  = 'до ' + state.sub.expires_at;
  $('sub-info').classList.add('active');

  // Welcome models
  const grid = $('welcome-models');
  grid.innerHTML = '';
  (state.sub.models || []).forEach(m => {
    const chip = el('div', 'model-chip', m.label);
    grid.appendChild(chip);
  });
}

async function handleActivate() {
  const code = $('code-input').value.trim().toUpperCase();
  if (!code) return;

  const btn = $('btn-activate');
  btn.disabled = true;
  btn.textContent = 'Проверяем…';
  $('auth-error').classList.remove('visible');

  try {
    const data = await api('/activate', 'POST', { code });
    saveAuth(data);
    updateSubInfo();
    await loadChats();
    showScreen('welcome');
    toast('Подписка активирована!', 'success');
  } catch (e) {
    $('auth-error').textContent = e.message;
    $('auth-error').classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Активировать';
  }
}

async function checkAuth() {
  if (!state.token) { showScreen('auth'); return; }
  try {
    await api('/me');  // проверяем что токен ещё рабочий
    updateSubInfo();
    await loadChats();
    showScreen('welcome');
  } catch {
    clearAuth();
    showScreen('auth');
  }
}

// ════════════════════════════════════════════════════════
// CHATS
// ════════════════════════════════════════════════════════
async function loadChats() {
  try {
    const data = await api('/chats');
    state.chats = data.chats || [];
    renderChatList();
  } catch { /* ignore */ }
}

function renderChatList() {
  const list = $('chat-list');
  list.innerHTML = '';

  if (!state.chats.length) {
    list.innerHTML = '<div class="chats-empty">Чатов пока нет</div>';
    return;
  }

  state.chats.forEach(chat => {
    const item = el('div', 'chat-item' + (chat.id === state.activeChatId ? ' active' : ''));
    item.innerHTML = `
      <div class="chat-item-info">
        <div class="chat-item-title">${escHtml(chat.title)}</div>
        <div class="chat-item-model">${escHtml(chat.model_label)}</div>
      </div>
      <button class="chat-item-del" data-id="${chat.id}" title="Удалить">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    `;
    item.addEventListener('click', e => {
      if (e.target.closest('.chat-item-del')) return;
      openChat(chat);
    });
    item.querySelector('.chat-item-del').addEventListener('click', () => deleteChat(chat.id));
    list.appendChild(item);
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function openChat(chat) {
  state.activeChatId = chat.id;
  renderChatList();

  $('chat-title').textContent  = chat.title;
  $('chat-model').textContent  = chat.model_label;
  $('messages').innerHTML = '';
  showScreen('chat');
  $('msg-input').focus();

  // Загружаем историю
  try {
    const data = await api(`/chats/${chat.id}/messages`);
    (data.messages || []).forEach(m => appendMessage(m.role, m.content));
    scrollMessages();
  } catch { /* ignore */ }
}

async function deleteChat(chatId) {
  try {
    await api(`/chats/${chatId}`, 'DELETE');
    state.chats = state.chats.filter(c => c.id !== chatId);
    if (state.activeChatId === chatId) {
      state.activeChatId = null;
      showScreen('welcome');
    }
    renderChatList();
    toast('Чат удалён');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ════════════════════════════════════════════════════════
// NEW CHAT MODAL
// ════════════════════════════════════════════════════════
let selectedModelKey = null;

function openNewChatModal() {
  if (!state.sub) { toast('Нет активной подписки', 'error'); return; }

  selectedModelKey = null;
  $('chat-title-input').value = '';

  const list = $('model-list');
  list.innerHTML = '';
  const models = state.sub.models || [];

  const MODEL_ICONS = {
    claude: '🟣', gpt: '🟢', gemini: '💎', grok: '⚫',
  };

  models.forEach(m => {
    const icon = Object.entries(MODEL_ICONS).find(([k]) => m.key.includes(k))?.[1] || '🤖';
    const opt = el('div', 'model-option');
    opt.innerHTML = `
      <div class="model-option-icon">${icon}</div>
      <div class="model-option-name">${escHtml(m.label)}</div>
    `;
    opt.dataset.key = m.key;
    opt.addEventListener('click', () => {
      list.querySelectorAll('.model-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedModelKey = m.key;
      $('btn-create-chat').disabled = false;
    });
    list.appendChild(opt);
  });

  // Автовыбор первой модели
  if (models.length) {
    list.firstChild.click();
  }

  $('btn-create-chat').disabled = !selectedModelKey;
  $('modal-new-chat').classList.add('visible');
}

async function createChat() {
  if (!selectedModelKey) return;

  const title = $('chat-title-input').value.trim() || null;
  $('modal-new-chat').classList.remove('visible');
  showLoading('Открываю браузер…');

  try {
    const data = await api('/chats', 'POST', {
      model_key: selectedModelKey,
      title,
    });
    const chat = {
      id: data.chat_id,
      title: data.title,
      model_key: data.model_key,
      model_label: data.model_label,
    };
    state.chats.unshift(chat);
    renderChatList();
    await openChat(chat);
    toast('Чат создан!', 'success');
  } catch (e) {
    toast(e.message, 'error');
    showScreen(state.chats.length ? 'welcome' : 'welcome');
  } finally {
    hideLoading();
  }
}

// ════════════════════════════════════════════════════════
// MESSAGES
// ════════════════════════════════════════════════════════
function appendMessage(role, text) {
  const wrap = el('div', `message ${role}`);
  const avatar = el('div', 'msg-avatar', role === 'user' ? '👤' : '✦');
  const bubble = el('div', 'msg-bubble');

  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  $('messages').appendChild(wrap);
}

function appendTyping() {
  const wrap = el('div', 'message assistant');
  wrap.id = 'typing-msg';
  const avatar = el('div', 'msg-avatar', '✦');
  const bubble = el('div', 'msg-bubble');
  bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  $('messages').appendChild(wrap);
  scrollMessages();
}

function removeTyping() {
  const t = $('typing-msg');
  if (t) t.remove();
}

function scrollMessages() {
  const m = $('messages');
  m.scrollTop = m.scrollHeight;
}

async function sendMessage() {
  if (state.sending || !state.activeChatId) return;
  const text = $('msg-input').value.trim();
  if (!text) return;

  state.sending = true;
  $('btn-send').disabled = true;
  $('msg-input').value = '';
  autoResize();

  appendMessage('user', text);
  appendTyping();
  scrollMessages();

  try {
    const data = await api(`/chats/${state.activeChatId}/message`, 'POST', {
      text,
      chat_id: state.activeChatId,
    });
    removeTyping();
    appendMessage('assistant', data.text);
    scrollMessages();
  } catch (e) {
    removeTyping();
    appendMessage('assistant', '❌ Ошибка: ' + e.message);
    scrollMessages();
  } finally {
    state.sending = false;
    $('btn-send').disabled = false;
    $('msg-input').focus();
  }
}

// ════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════

// Code input formatting
$('code-input').addEventListener('input', function() {
  let v = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 12);
  let out = '';
  for (let i = 0; i < v.length; i++) {
    if (i === 4 || i === 8) out += '-';
    out += v[i];
  }
  this.value = out;
});

$('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleActivate();
});

$('btn-activate').addEventListener('click', handleActivate);
$('btn-logout').addEventListener('click', () => {
  clearAuth();
  state.chats = [];
  state.activeChatId = null;
  showScreen('auth');
});

$('btn-new-chat').addEventListener('click', openNewChatModal);
$('modal-close').addEventListener('click', () => $('modal-new-chat').classList.remove('visible'));
$('modal-new-chat').addEventListener('click', e => {
  if (e.target === $('modal-new-chat')) $('modal-new-chat').classList.remove('visible');
});
$('btn-create-chat').addEventListener('click', createChat);

// Auto-resize textarea
function autoResize() {
  const ta = $('msg-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
}

$('msg-input').addEventListener('input', () => {
  autoResize();
  $('btn-send').disabled = !$('msg-input').value.trim() || state.sending;
});

$('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

$('btn-send').addEventListener('click', sendMessage);

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
checkAuth();
</script>
</body>
</html>
