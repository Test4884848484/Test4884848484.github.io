<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500&family=Tiempos+Text:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* Fallback fonts если Styrene/Tiempos не грузятся */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');

:root {
  --bg:         #f5f0e8;
  --surface:    #faf7f2;
  --surface2:   #f0ebe0;
  --border:     #e0d8c8;
  --border2:    #cfc5b0;
  --text:       #1a1612;
  --text2:      #4a4035;
  --muted:      #9a8f80;
  --accent:     #c96442;
  --accent-h:   #b8532f;
  --user-bg:    #1a1612;
  --user-text:  #faf7f2;
  --r:          16px;
  --r-sm:       10px;
  --r-xs:       6px;
  --sidebar-w:  260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
#sidebar {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.sidebar-top {
  padding: 20px 16px 16px;
}

/* Logo */
.logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
  padding: 0 4px;
}

.logo-mark {
  width: 28px; height: 28px;
  background: var(--text);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg { color: var(--bg); }

.logo-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 18px;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* New chat */
.btn-new {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 14px;
  background: var(--text);
  color: var(--surface);
  border: none; border-radius: var(--r-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-new:hover { background: var(--text2); }

/* Sub badge */
.sub-badge {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
  font-size: 12px;
}
.sub-badge-name { font-weight: 600; color: var(--text); }
.sub-badge-exp  { color: var(--muted); margin-top: 2px; }

/* Chat list */
.sidebar-label {
  padding: 16px 20px 8px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--muted);
}

#chat-list {
  flex: 1; overflow-y: auto;
  padding: 0 8px 8px;
}
#chat-list::-webkit-scrollbar { width: 3px; }
#chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.chat-item {
  display: flex; align-items: center;
  padding: 8px 12px;
  border-radius: var(--r-xs);
  cursor: pointer;
  transition: background 0.1s;
  gap: 8px;
  margin-bottom: 1px;
}
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: var(--surface2); border: 1px solid var(--border); }

.chat-item-icon {
  width: 20px; height: 20px; flex-shrink: 0;
  opacity: 0.4;
}

.chat-item-body { flex: 1; min-width: 0; }
.chat-item-title {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.chat-item-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

.chat-del {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 2px; opacity: 0;
  transition: opacity 0.1s, color 0.1s;
  flex-shrink: 0;
}
.chat-item:hover .chat-del { opacity: 1; }
.chat-del:hover { color: #c0392b; }

.chats-empty {
  padding: 24px 12px; text-align: center;
  font-size: 13px; color: var(--muted); line-height: 1.5;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.btn-signout {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 10px;
  background: none; border: 1px solid var(--border);
  border-radius: var(--r-xs); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.1s;
}
.btn-signout:hover { border-color: var(--border2); color: var(--text2); }

/* ══════════════════════════════════════════
   MAIN
══════════════════════════════════════════ */
#main {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
  position: relative;
}

/* ── Auth ── */
#auth-screen {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 24px;
  background: var(--bg);
}
#auth-screen.visible { display: flex; }

.auth-wrap {
  width: 100%; max-width: 380px;
}

.auth-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 40px;
}
.auth-logo-mark {
  width: 36px; height: 36px;
  background: var(--text);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.auth-logo-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 22px; color: var(--text);
}

.auth-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 28px; line-height: 1.2;
  color: var(--text); margin-bottom: 8px;
}
.auth-sub {
  font-size: 14px; color: var(--muted); margin-bottom: 32px;
  line-height: 1.5;
}

.field-label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text2); margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.field-input {
  width: 100%; padding: 11px 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-xs);
  font-family: 'DM Sans', monospace;
  font-size: 15px; letter-spacing: 2px;
  color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: var(--text2); }
.field-input::placeholder { color: var(--muted); letter-spacing: 1px; }

.btn-primary {
  width: 100%; padding: 12px;
  background: var(--text);
  color: var(--surface);
  border: none; border-radius: var(--r-xs);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  cursor: pointer; margin-top: 12px;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--text2); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

.auth-err {
  display: none; margin-top: 12px; padding: 10px 14px;
  background: #fdf2f0; border: 1px solid #f5c6bb;
  border-radius: var(--r-xs); font-size: 13px; color: #8b2e1a;
}
.auth-err.visible { display: block; }

/* ── Welcome ── */
#welcome-screen {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 40px; text-align: center;
}
#welcome-screen.visible { display: flex; }

.welcome-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 36px; color: var(--text);
  margin-bottom: 12px; letter-spacing: -0.5px;
}
.welcome-sub {
  font-size: 15px; color: var(--muted);
  max-width: 400px; line-height: 1.6; margin-bottom: 32px;
}
.welcome-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; max-width: 480px;
}
.welcome-chip {
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 13px; color: var(--text2);
}

/* ── Chat ── */
#chat-screen {
  display: none; flex-direction: column; height: 100%;
}
#chat-screen.visible { display: flex; }

.chat-topbar {
  display: flex; align-items: center;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 12px;
}
.chat-topbar-info { flex: 1; min-width: 0; }
.chat-topbar-title {
  font-size: 15px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-topbar-model { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Messages */
#messages {
  flex: 1; overflow-y: auto;
  padding: 32px 0;
  display: flex; flex-direction: column; gap: 0;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row {
  display: flex;
  padding: 4px 24px;
  gap: 16px;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  animation: fadeUp 0.2s ease-out;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { flex-direction: row-reverse; align-self: flex-end; margin-left: auto; margin-right: 24px; max-width: 600px; padding: 4px 0; }
.msg-row.assistant { align-self: flex-start; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 6px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 13px; margin-top: 2px;
}
.msg-row.user .msg-avatar { background: var(--text); color: var(--surface); font-size: 11px; }
.msg-row.assistant .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

.msg-body { flex: 1; min-width: 0; }

.msg-name {
  font-size: 12px; font-weight: 600; color: var(--muted);
  margin-bottom: 4px; letter-spacing: 0.2px;
}

.msg-bubble {
  font-size: 14px; line-height: 1.7; color: var(--text);
}

.msg-row.user .msg-bubble {
  background: var(--user-bg);
  color: var(--user-text);
  padding: 10px 16px;
  border-radius: var(--r-sm);
  border-bottom-right-radius: 4px;
  font-size: 14px;
}

/* File attachment badge in message */
.msg-file-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: rgba(255,255,255,0.12);
  border-radius: var(--r-xs);
  font-size: 12px;
  margin-bottom: 6px;
}
.msg-row.assistant .msg-file-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
}

/* Markdown */
.msg-bubble p { margin-bottom: 10px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { font-family: 'DM Serif Display', serif; margin: 16px 0 6px; }
.msg-bubble h1 { font-size: 20px; }
.msg-bubble h2 { font-size: 17px; }
.msg-bubble h3 { font-size: 15px; }
.msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 8px 0; }
.msg-bubble li { margin-bottom: 4px; }
.msg-bubble strong { font-weight: 600; }
.msg-bubble em { font-style: italic; }
.msg-bubble code {
  font-family: 'DM Mono', 'Fira Code', monospace;
  font-size: 13px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 4px;
}
.msg-bubble pre {
  background: var(--text);
  border-radius: var(--r-xs);
  padding: 14px 16px;
  overflow-x: auto; margin: 12px 0;
}
.msg-bubble pre code {
  background: none; border: none; padding: 0;
  color: #e8e0d0; font-size: 13px;
}
.msg-bubble blockquote {
  border-left: 3px solid var(--border2);
  padding-left: 14px; color: var(--muted); margin: 8px 0;
  font-style: italic;
}
.msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.msg-bubble a { color: var(--accent); text-decoration: underline; }
.msg-bubble table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
.msg-bubble th { background: var(--surface2); font-weight: 600; }

/* Typing */
.typing-row {
  display: flex; padding: 4px 24px; gap: 16px;
  max-width: 780px; width: 100%; margin: 0 auto;
}
.typing-dots {
  display: flex; align-items: center; gap: 5px;
  padding: 10px 0; height: 28px;
}
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
  animation: blink 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Input area ── */
.input-area {
  padding: 16px 24px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

/* File preview */
#file-preview {
  display: none;
  align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
  margin-bottom: 8px;
  font-size: 13px; color: var(--text2);
}
#file-preview.visible { display: flex; }
#file-preview-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#file-preview-size { color: var(--muted); flex-shrink: 0; }
.btn-file-remove {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 2px; flex-shrink: 0;
  transition: color 0.1s;
}
.btn-file-remove:hover { color: #c0392b; }

.input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 8px 8px 8px 14px;
  transition: border-color 0.15s;
}
.input-box:focus-within { border-color: var(--border2); }

#msg-input {
  flex: 1; resize: none; border: none; outline: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; line-height: 1.5; color: var(--text);
  min-height: 24px; max-height: 160px;
  padding: 2px 0;
}
#msg-input::placeholder { color: var(--muted); }

.input-actions {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}

/* File button */
.btn-file {
  width: 34px; height: 34px;
  background: none; border: none; cursor: pointer;
  color: var(--muted); border-radius: var(--r-xs);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, color 0.1s;
  position: relative;
}
.btn-file:hover { background: var(--surface2); color: var(--text2); }
.btn-file input {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

/* Send button */
.btn-send {
  width: 34px; height: 34px;
  background: var(--text); color: var(--surface);
  border: none; border-radius: var(--r-xs);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, opacity 0.1s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--text2); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

.input-hint {
  font-size: 11px; color: var(--muted); margin-top: 8px;
  text-align: center;
}

/* ══════════════════════════════════════════
   MODAL: New Chat
══════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(26, 22, 18, 0.5);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: none; align-items: center; justify-content: center; padding: 16px;
}
.overlay.visible { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px;
  width: 100%; max-width: 420px;
  position: relative;
  animation: scaleIn 0.18s ease-out;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96) translateY(-8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 22px; margin-bottom: 20px; color: var(--text);
}

.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 4px; transition: color 0.1s;
}
.modal-close:hover { color: var(--text); }

.models-scroll {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 260px; overflow-y: auto; margin-bottom: 16px;
}
.models-scroll::-webkit-scrollbar { width: 3px; }
.models-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.model-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-xs);
  cursor: pointer; transition: all 0.1s;
  background: var(--bg);
}
.model-row:hover { border-color: var(--border2); background: var(--surface2); }
.model-row.sel { border-color: var(--text); background: var(--surface2); }
.model-row-icon { font-size: 16px; flex-shrink: 0; }
.model-row-name { font-size: 14px; font-weight: 500; }

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0;
  background: rgba(245,240,232,0.85);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
#loading.visible { display: flex; }

.spinner {
  width: 36px; height: 36px;
  border: 2.5px solid var(--border2);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 14px; color: var(--text2); }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--text); color: var(--surface);
  padding: 10px 20px; border-radius: 100px;
  font-size: 13px; font-weight: 500;
  z-index: 300; opacity: 0; transition: all 0.2s;
  pointer-events: none; white-space: nowrap;
}
#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err { background: #8b2e1a; }

/* ══════════════════════════════════════════
   MOBILE
══════════════════════════════════════════ */
@media (max-width: 640px) {
  #app { grid-template-columns: 1fr; }
  #sidebar { display: none; }
  #sidebar.open { display: flex; position: fixed; inset: 0 25% 0 0; z-index: 50; }
  .msg-row { padding: 4px 16px; }
  .input-area { padding: 12px 16px 16px; }
}
</style>
</head>
<body>

<div id="app">
<!-- ═══════════ SIDEBAR ═══════════ -->
<aside id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1.5C4.41 1.5 1.5 4.41 1.5 8S4.41 14.5 8 14.5 14.5 11.59 14.5 8 11.59 1.5 8 1.5zm0 2a4.5 4.5 0 110 9 4.5 4.5 0 010-9z" fill="currentColor" opacity=".4"/>
          <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-name">Copilot AI</span>
    </div>

    <button class="btn-new" id="btn-new">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Новый чат
    </button>

    <div class="sub-badge" id="sub-badge" style="display:none">
      <div class="sub-badge-name" id="sub-name">—</div>
      <div class="sub-badge-exp" id="sub-exp">—</div>
    </div>
  </div>

  <div class="sidebar-label">Чаты</div>
  <div id="chat-list"><div class="chats-empty">Нет чатов</div></div>

  <div class="sidebar-footer">
    <button class="btn-signout" id="btn-signout">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5 2H2a1 1 0 00-1 1v8a1 1 0 001 1h3M9 10l3-3-3-3M13 7H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Выйти
    </button>
  </div>
</aside>

<!-- ═══════════ MAIN ═══════════ -->
<main id="main">

  <!-- Auth -->
  <div id="auth-screen">
    <div class="auth-wrap">
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
            <path d="M8 1.5C4.41 1.5 1.5 4.41 1.5 8S4.41 14.5 8 14.5 14.5 11.59 14.5 8 11.59 1.5 8 1.5zm0 2a4.5 4.5 0 110 9 4.5 4.5 0 010-9z" fill="#f5f0e8" opacity=".5"/>
            <circle cx="8" cy="8" r="2.5" fill="#f5f0e8"/>
          </svg>
        </div>
        <span class="auth-logo-name">Copilot AI</span>
      </div>
      <div class="auth-title">Добро пожаловать</div>
      <div class="auth-sub">Введите код активации чтобы получить доступ к AI-моделям</div>
      <label class="field-label" for="code-inp">Код активации</label>
      <input class="field-input" id="code-inp" type="text" placeholder="XXXX-XXXX-XXXX" maxlength="14" autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="btn-activate">Войти</button>

  <!-- Welcome -->
  <div id="welcome-screen">
    <div class="welcome-title">С чего начнём?</div>
    <div class="welcome-sub">Создайте новый чат и выберите модель. Поддерживаются Claude, GPT, Gemini и другие.</div>

            </svg>
          </button>

      <div class="input-hint">Enter — отправить · Shift+Enter — перенос строки</div>

</main>

<!-- Modal: New Chat -->
<div class="overlay" id="modal-new">
  <div class="modal">
    <button class="modal-close" id="modal-close">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="modal-title">Новый чат</div>
    <div style="margin-bottom:14px">
      <label class="field-label">Название (необязательно)</label>
      <input class="field-input" id="new-title" type="text" placeholder="Мой чат" style="letter-spacing:normal;font-family:'DM Sans',sans-serif">
    </div>
    <div style="margin-bottom:0">
      <label class="field-label">Модель</label>
      <div class="models-scroll" id="models-scroll"></div>
    </div>
    <button class="btn-primary" id="btn-create">Создать</button>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">Открываю браузер…</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ════════════════════════════════
// CONFIG
// ════════════════════════════════
const API = 'https://46-173-27-68.sslip.io:8443';

// ════════════════════════════════
// STATE
// ════════════════════════════════
let S = {
  token:    localStorage.getItem('t') || null,
  userId:   localStorage.getItem('u') || null,
  sub:      JSON.parse(localStorage.getItem('s') || 'null'),
  chats:    [],
  chatId:   null,
  sending:  false,
  file:     null,   // { file: File, name, size }
};

// ════════════════════════════════
// UTILS
// ════════════════════════════════
const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function toast(msg, err=false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'visible' + (err ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className='', 3000);
}

function showLoad(msg='Загрузка…') {
  $('loading-msg').textContent = msg;
  $('loading').classList.add('visible');
}
function hideLoad() { $('loading').classList.remove('visible'); }

async function api(path, method='GET', body=null) {
  const h = {'Content-Type':'application/json'};
  if (S.token) h['Authorization'] = 'Bearer ' + S.token;
  const r = await fetch(API + path, {method, headers: h, body: body ? JSON.stringify(body) : null});
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || `Ошибка ${r.status}`);
  return d;
}

async function apiForm(path, formData) {
  const h = {};
  if (S.token) h['Authorization'] = 'Bearer ' + S.token;
  const r = await fetch(API + path, {method:'POST', headers: h, body: formData});
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || `Ошибка ${r.status}`);
  return d;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

// ════════════════════════════════
// SCREENS
// ════════════════════════════════
function screen(name) {
  ['auth','welcome','chat'].forEach(n =>
    $(n+'-screen').classList.toggle('visible', n===name)
  );
}

// ════════════════════════════════
// AUTH
// ════════════════════════════════
function saveAuth(d) {
  S.token = d.token; S.userId = d.user_id; S.sub = d.subscription;
  localStorage.setItem('t', S.token);
  localStorage.setItem('u', S.userId);
  localStorage.setItem('s', JSON.stringify(S.sub));
}
function clearAuth() {
  S.token=S.userId=S.sub=null;
  ['t','u','s'].forEach(k=>localStorage.removeItem(k));
}

function renderSubInfo() {
  if (!S.sub) return;
  $('sub-name').textContent = S.sub.name;
  $('sub-exp').textContent  = 'до ' + S.sub.expires_at;
  $('sub-badge').style.display = 'block';

  const chips = $('welcome-chips');
  chips.innerHTML = '';
  (S.sub.models||[]).forEach(m => {
    const c = document.createElement('div');
    c.className = 'welcome-chip';
    c.textContent = m.label;
    chips.appendChild(c);
  });
}

async function doActivate() {
  const code = $('code-inp').value.trim().toUpperCase();
  if (!code) return;
  const btn = $('btn-activate');
  btn.disabled = true; btn.textContent = 'Проверяем…';
  $('auth-err').classList.remove('visible');
  try {
    const d = await api('/activate','POST',{code});
    saveAuth(d); renderSubInfo();
    await loadChats();
    screen('welcome');
    toast('Добро пожаловать!');
  } catch(e) {
    $('auth-err').textContent = e.message;
    $('auth-err').classList.add('visible');
  } finally {
    btn.disabled=false; btn.textContent='Войти';
  }
}

async function checkAuth() {
  if (!S.token) { screen('auth'); return; }
  try {
    await api('/me');
    renderSubInfo();
    await loadChats();
    screen('welcome');
  } catch {
    clearAuth(); screen('auth');
  }
}

// ════════════════════════════════
// CHATS
// ════════════════════════════════
async function loadChats() {
  try {
    const d = await api('/chats');
    S.chats = d.chats || [];
    renderChatList();
  } catch {}
}

function renderChatList() {
  const list = $('chat-list');
  list.innerHTML = '';
  if (!S.chats.length) {
    list.innerHTML = '<div class="chats-empty">Нет чатов</div>';
    return;
  }
  S.chats.forEach(c => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (c.id===S.chatId?' active':'');
    div.innerHTML = `
      <svg class="chat-item-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14 10a1 1 0 01-1 1H5l-3 3V3a1 1 0 011-1h10a1 1 0 011 1v7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <div class="chat-item-body">
        <div class="chat-item-title">${esc(c.title)}</div>
        <div class="chat-item-sub">${esc(c.model_label)}</div>
      </div>
      <button class="chat-del" data-id="${c.id}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>`;
    div.addEventListener('click', e => {
      if (e.target.closest('.chat-del')) return;
      openChat(c);
    });
    div.querySelector('.chat-del').addEventListener('click', ()=>delChat(c.id));
    list.appendChild(div);
  });
}

async function openChat(c) {
  S.chatId = c.id;
  renderChatList();
  $('topbar-title').textContent = c.title;
  $('topbar-model').textContent = c.model_label;
  $('messages').innerHTML = '';
  screen('chat');
  $('msg-input').focus();
  try {
    const d = await api(`/chats/${c.id}/messages`);
    (d.messages||[]).forEach(m => addMsg(m.role, m.content));
    scrollMsgs();
  } catch {}
}

async function delChat(id) {
  try {
    await api(`/chats/${id}`,'DELETE');
    S.chats = S.chats.filter(c=>c.id!==id);
    if (S.chatId===id) { S.chatId=null; screen('welcome'); }
    renderChatList();
    toast('Чат удалён');
  } catch(e) { toast(e.message,true); }
}

// ════════════════════════════════
// NEW CHAT MODAL
// ════════════════════════════════
let selModel = null;

function openModal() {
  if (!S.sub) { toast('Нет подписки',true); return; }
  selModel = null;
  $('new-title').value = '';
  const scroll = $('models-scroll');
  scroll.innerHTML = '';

  const ICONS = { claude:'🟣', gpt:'🟢', gemini:'💎', grok:'⚫' };

  (S.sub.models||[]).forEach(m => {
    const icon = Object.entries(ICONS).find(([k])=>m.key.includes(k))?.[1]||'🤖';
    const row = document.createElement('div');
    row.className = 'model-row';
    row.dataset.key = m.key;
    row.innerHTML = `<span class="model-row-icon">${icon}</span><span class="model-row-name">${esc(m.label)}</span>`;
    row.addEventListener('click', () => {
      scroll.querySelectorAll('.model-row').forEach(r=>r.classList.remove('sel'));
      row.classList.add('sel');
      selModel = m.key;
    });
    scroll.appendChild(row);
  });

  // Автовыбор первой модели
  if (scroll.firstChild) scroll.firstChild.click();
  $('modal-new').classList.add('visible');
}

async function createChat() {
  if (!selModel) return;
  const title = $('new-title').value.trim() || null;
  $('modal-new').classList.remove('visible');
  showLoad('Открываю браузер…');
  try {
    const d = await api('/chats','POST',{model_key:selModel, title});
    const c = {id:d.chat_id, title:d.title, model_key:d.model_key, model_label:d.model_label};
    S.chats.unshift(c);
    renderChatList();
    await openChat(c);
    toast('Чат создан');
  } catch(e) { toast(e.message,true); }
  finally { hideLoad(); }
}

// ════════════════════════════════
// FILE HANDLING
// ════════════════════════════════
const ALLOWED_EXT = new Set([
  'txt','md','csv','json','xml','yaml','yml',
  'py','js','ts','html','css','sql','sh',
  'pdf','docx','doc','xlsx','xls','pptx',
  'png','jpg','jpeg','gif','webp'
]);

function onFileSelect(e) {
  const file = e.target.files?.[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();
  if (!ALLOWED_EXT.has(ext)) {
    toast(`Тип .${ext} не поддерживается`, true);
    e.target.value = '';
    return;
  }
  if (file.size > 10 * 1024 * 1024) {
    toast('Файл слишком большой. Максимум 10 MB', true);
    e.target.value = '';
    return;
  }

  S.file = file;
  $('file-preview-name').textContent = file.name;
  $('file-preview-size').textContent = fmtSize(file.size);
  $('file-preview').classList.add('visible');
  updateSendBtn();
}

function removeFile() {
  S.file = null;
  $('file-input').value = '';
  $('file-preview').classList.remove('visible');
  updateSendBtn();
}

function updateSendBtn() {
  const hasText = $('msg-input').value.trim().length > 0;
  const hasFile = !!S.file;
  $('btn-send').disabled = (!hasText && !hasFile) || S.sending;
}

// ════════════════════════════════
// MESSAGES
// ════════════════════════════════
function md(text) {
  // Простой markdown рендерер
  let h = esc(text);
  // code blocks
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );
  // inline code
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // bold
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  h = h.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // headers
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // blockquote
  h = h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // hr
  h = h.replace(/^[-*]{3,}$/gm,'<hr>');
  // lists
  h = h.replace(/^[\-*] (.+)$/gm,'<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  h = h.replace(/<\/ul>\s*<ul>/g,'');
  // links
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // paragraphs
  h = h.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return `<p>${h}</p>`;
}

function addMsg(role, text, fileName='') {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role==='user' ? 'Вы' : '✦';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = role==='user' ? 'Вы' : 'Copilot AI';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (fileName) {
    const badge = document.createElement('div');
    badge.className = 'msg-file-badge';
    badge.innerHTML = `<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M8 1H3a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V5L8 1z" stroke="currentColor" stroke-width="1.3"/></svg> ${esc(fileName)}`;
    bubble.appendChild(badge);
    bubble.appendChild(document.createElement('br'));
  }

  if (role==='assistant') {
    const content = document.createElement('div');
    content.innerHTML = md(text);
    bubble.appendChild(content);
  } else {
    bubble.appendChild(document.createTextNode(text));
  }

  body.appendChild(name);
  body.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(body);
  $('messages').appendChild(row);
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-avatar'; av.textContent = '✦';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av); row.appendChild(dots);
  $('messages').appendChild(row);
  scrollMsgs();
}
function removeTyping() { const t=$('typing'); if(t) t.remove(); }
function scrollMsgs() { const m=$('messages'); m.scrollTop=m.scrollHeight; }

// ════════════════════════════════
// SEND
// ════════════════════════════════
async function send() {
  if (S.sending || !S.chatId) return;
  const text = $('msg-input').value.trim();
  const file = S.file;
  if (!text && !file) return;

  S.sending = true;
  $('btn-send').disabled = true;
  $('msg-input').value = '';
  autoResize();

  // Показываем сообщение пользователя
  const displayText = text || `[Файл: ${file.name}]`;
  addMsg('user', displayText, file ? file.name : '');
  removeFile();
  addTyping();
  scrollMsgs();

  try {
    let result;
    if (file) {
      // Отправляем как multipart/form-data
      const fd = new FormData();
      if (text) fd.append('text', text);
      fd.append('file', file);
      result = await apiForm(`/chats/${S.chatId}/message`, fd);
    } else {
      // Только текст — через JSON (старый путь не работает с FormData без файла)
      const fd = new FormData();
      fd.append('text', text);
      result = await apiForm(`/chats/${S.chatId}/message`, fd);
    }
    removeTyping();
    addMsg('assistant', result.text);
    scrollMsgs();
  } catch(e) {
    removeTyping();
    addMsg('assistant', '❌ ' + e.message);
    scrollMsgs();
  } finally {
    S.sending = false;
    updateSendBtn();
    $('msg-input').focus();
  }
}

// ════════════════════════════════
// AUTO RESIZE TEXTAREA
// ════════════════════════════════
function autoResize() {
  const ta = $('msg-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

// ════════════════════════════════
// EVENTS
// ════════════════════════════════

// Code formatting
$('code-inp').addEventListener('input', function() {
  let v = this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,12);
  let o='';
  for(let i=0;i<v.length;i++){if(i===4||i===8)o+='-';o+=v[i];}
  this.value=o;
});
$('code-inp').addEventListener('keydown', e=>{ if(e.key==='Enter') doActivate(); });
$('btn-activate').addEventListener('click', doActivate);
$('btn-signout').addEventListener('click', ()=>{ clearAuth(); S.chats=[]; S.chatId=null; screen('auth'); });

$('btn-new').addEventListener('click', openModal);
$('modal-close').addEventListener('click', ()=>$('modal-new').classList.remove('visible'));
$('modal-new').addEventListener('click', e=>{ if(e.target===$('modal-new')) $('modal-new').classList.remove('visible'); });
$('btn-create').addEventListener('click', createChat);

$('file-input').addEventListener('change', onFileSelect);
$('btn-file-remove').addEventListener('click', removeFile);

$('msg-input').addEventListener('input', ()=>{ autoResize(); updateSendBtn(); });
$('msg-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }
});
$('btn-send').addEventListener('click', send);

// ════════════════════════════════
// INIT
// ════════════════════════════════
checkAuth();
</script>
</body>
