<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👋 Привет!</h1>
        </div>
        <div class="user-info">
            <div id="userData">
                <p><strong>Имя пользователя:</strong> <span id="username">Загрузка...</span></p>
                <p><strong>Имя:</strong> <span id="firstName">Загрузка...</span></p>
                <p><strong>Фамилия:</strong> <span id="lastName">Загрузка...</span></p>
            </div>
        </div>
        <button onclick="showAlert()" class="btn">Нажми меня!</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
