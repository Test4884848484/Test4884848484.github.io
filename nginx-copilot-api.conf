# /etc/nginx/sites-available/copilot-api
#
# Сохрани этот файл на сервере и выполни:
#   sudo ln -s /etc/nginx/sites-available/copilot-api /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d API_DOMAIN.sslip.io  (если нужен HTTPS)
#   sudo nginx -t && sudo systemctl reload nginx
#
# sslip.io домен: IP вида 46-173-27-68.sslip.io указывает на 46.173.27.68
# Чтобы не конфликтовать с текущим сайтом на порту 80/443,
# API работает на порту 8001 напрямую (без nginx) — или через отдельный server block ниже.

# ── Вариант 1: Отдельный server block на порту 8443 (HTTPS) ─────────────
# Это позволяет иметь одновременно:
#   - текущий сайт на https://46-173-27-68.sslip.io (порт 443)
#   - API на https://46-173-27-68.sslip.io:8443/api/  (порт 8443)

server {
    listen 8443 ssl;
    server_name 46-173-27-68.sslip.io;

    # Сертификат (Let's Encrypt через certbot):
    # sudo certbot certonly --standalone -d 46-173-27-68.sslip.io
    ssl_certificate     /etc/letsencrypt/live/46-173-27-68.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/46-173-27-68.sslip.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/copilot-api-access.log;
    error_log  /var/log/nginx/copilot-api-error.log;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Долгий таймаут — AI может думать до 5 минут
        proxy_read_timeout  360;
        proxy_send_timeout  360;
        proxy_connect_timeout 10;

        # CORS уже настроен в FastAPI, nginx не дублирует
    }
}

# ── Вариант 2: Без nginx — просто запусти uvicorn напрямую ───────────────
# uvicorn api:app --host 0.0.0.0 --port 8001
# Тогда API будет на: http://46.173.27.68:8001
# Фронтенд обращается к: http://46-173-27-68.sslip.io:8001
#
# Минус: HTTP (не HTTPS). GitHub Pages → HTTP = браузер заблокирует
# из-за mixed content. Поэтому nginx + certbot предпочтительнее.
